<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - MRZ OCR 控制台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.3);
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/static/images/login-bg.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.2) 100%);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 48px 40px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 32px;
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo-area p {
            color: var(--text-sub);
            font-size: 15px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            margin-top: 8px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .footer-links {
            margin-top: 24px;
            font-size: 14px;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .footer-links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        #loginStatus {
            margin-top: 16px;
            font-size: 14px;
            min-height: 20px;
        }

        .status-error { color: #ef4444; }
        .status-success { color: #10b981; }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .btn-text { display: none; }
        .loading .spinner { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-card">
            <div class="logo-area">
                <h1>MRZ OCR 控制台</h1>
                <p>專業護照辨識與金鑰管理系統</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">帳號</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="請輸入帳號" required autocomplete="username">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="password">密碼</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="請輸入密碼" required autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">登入系統</span>
                    <div class="spinner"></div>
                </button>
            </form>
            
            <div id="loginStatus"></div>
            
            <div class="footer-links">
                <a href="/">返回首頁</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginStatus = document.getElementById('loginStatus');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Set loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            loginStatus.textContent = '';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    loginStatus.className = 'status-success';
                    loginStatus.textContent = '登入成功，正在跳轉...';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    loginStatus.className = 'status-error';
                    loginStatus.textContent = result.message || '登入失敗';
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            } catch (err) {
                loginStatus.className = 'status-error';
                loginStatus.textContent = '伺服器連線失敗';
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
